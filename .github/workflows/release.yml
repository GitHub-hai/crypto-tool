name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Sync version from tag
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" crypto_tool/__init__.py
        echo "Version: $VERSION"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -e .

    - name: Build binary (Windows / Linux)
      if: runner.os != 'macOS'
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          pyinstaller --onefile --windowed --name crypto-tool run_gui.py
          echo "ASSET=dist/crypto-tool.exe" >> $GITHUB_ENV
        else
          pyinstaller --onefile --name crypto-tool run_gui.py
          echo "ASSET=dist/crypto-tool" >> $GITHUB_ENV
        fi

    - name: Build binary (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        pyinstaller --onefile --name crypto-tool --hidden-import tkinter run_gui.py
        echo "ASSET=dist/crypto-tool" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: crypto-tool-${{ matrix.os }}
        path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: crypto-tool-*
        path: artifacts
        merge-multiple: false

    - name: Prepare files
      run: |
        mkdir dist
        cp artifacts/crypto-tool-windows-latest/crypto-tool.exe dist/
        cp artifacts/crypto-tool-ubuntu-latest/crypto-tool dist/crypto-tool-linux
        cp artifacts/crypto-tool-macos-latest/crypto-tool dist/crypto-tool-macos

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
